<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111827;
      color: #f3f4f6;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      text-align: center;
      margin-bottom: 0.3rem;
      font-size: 1.8rem;
      font-weight: 700;
      color: #f9fafb;
    }

    .subtitle {
      text-align: center;
      color: #6b7280;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }

    .widgets {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.25rem;
      max-width: 1000px;
      margin: 0 auto;
    }

    .widget {
      background: #1f2937;
      border-radius: 14px;
      padding: 1.5rem;
      border: 1px solid #374151;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .widget:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }

    .widget-label {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
      color: #f9fafb;
    }

    .widget-address {
      font-size: 0.78rem;
      color: #6b7280;
      margin-bottom: 1rem;
    }

    .widget-times {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .widget-direction {
      padding: 0.75rem;
      background: #111827;
      border-radius: 10px;
      border: 1px solid #374151;
    }

    .direction-label {
      font-size: 0.7rem;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.4rem;
      font-weight: 500;
    }

    .widget-time {
      font-size: 1.6rem;
      font-weight: 700;
      color: #34d399;
    }

    .widget-time.moderate { color: #fbbf24; }
    .widget-time.heavy { color: #f87171; }

    .widget-details {
      margin-top: 0.5rem;
      font-size: 0.78rem;
      color: #9ca3af;
    }

    .widget-details span {
      display: block;
      margin-top: 0.2rem;
    }

    .traffic-indicator {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 5px;
    }

    .traffic-indicator.light { background: #34d399; }
    .traffic-indicator.moderate { background: #fbbf24; }
    .traffic-indicator.heavy { background: #f87171; }

    .loading {
      color: #6b7280;
      font-style: italic;
      font-size: 0.9rem;
    }

    .error {
      color: #f87171;
      font-size: 0.8rem;
    }

    .last-updated {
      text-align: center;
      margin-top: 1.5rem;
      color: #6b7280;
      font-size: 0.78rem;
    }

    .refresh-btn {
      display: block;
      margin: 0.75rem auto 0;
      padding: 0.5rem 1.5rem;
      background: #1f2937;
      color: #e5e7eb;
      border: 1px solid #4b5563;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s;
    }

    .refresh-btn:hover {
      background: #374151;
      border-color: #6b7280;
    }

    #map {
      max-width: 1000px;
      margin: 1.5rem auto 0;
      height: 450px;
      border-radius: 14px;
      border: 1px solid #374151;
      overflow: hidden;
      display: none;
    }

    #map.visible { display: block; }

    .map-header {
      max-width: 1000px;
      margin: 1rem auto 0;
      display: none;
      align-items: center;
      justify-content: space-between;
    }

    .map-header.visible { display: flex; }

    .map-title {
      font-size: 0.85rem;
      color: #9ca3af;
    }

    .map-close {
      padding: 0.3rem 0.8rem;
      background: #1f2937;
      color: #e5e7eb;
      border: 1px solid #4b5563;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.78rem;
    }

    .map-close:hover { background: #374151; }

    .widget-direction {
      padding: 0.75rem;
      background: #111827;
      border-radius: 10px;
      border: 1px solid #374151;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .widget-direction:hover {
      border-color: #6b7280;
    }
  </style>
</head>
<body>
  <h1>🏠 Travel Dashboard</h1>
  <p class="subtitle">Real-time travel times from home</p>

  <div class="widgets" id="widgets">
    <p class="loading">Loading destinations...</p>
  </div>

  <div class="map-header" id="mapHeader">
    <span class="map-title" id="mapTitle"></span>
    <button class="map-close" onclick="closeMap()">✕ Close map</button>
  </div>
  <div id="map"></div>

  <p class="last-updated" id="lastUpdated"></p>
  <button class="refresh-btn" onclick="fetchAllDirections()">↻ Refresh</button>

  <script>
    let config = null;

    async function loadConfig() {
      const res = await fetch('/api/config');
      config = await res.json();
      renderWidgets();
      fetchAllDirections();
    }

    function renderWidgets() {
      const container = document.getElementById('widgets');
      container.innerHTML = config.destinations.map((dest, i) => {
        const modeEmoji = { driving: '🚗', transit: '🚌', walking: '🚶', bicycling: '🚴' };
        const emoji = modeEmoji[dest.mode] || '🚗';
        return `
        <div class="widget" id="widget-${i}">
          <div class="widget-label">${emoji} ${dest.label}</div>
          <div class="widget-address">${dest.address}</div>
          <div class="widget-times">
            <div class="widget-direction" onclick="showRoute(${i}, 'go')">
              <div class="direction-label">→ Going</div>
              <div class="widget-time loading" id="go-time-${i}">Loading...</div>
              <div class="widget-details" id="go-details-${i}"></div>
            </div>
            <div class="widget-direction" onclick="showRoute(${i}, 'return')">
              <div class="direction-label">← Return</div>
              <div class="widget-time loading" id="return-time-${i}">Loading...</div>
              <div class="widget-details" id="return-details-${i}"></div>
            </div>
          </div>
        </div>
      `}).join('');
    }

    function renderDirectionResult(timeEl, detailsEl, data) {
      if (data.error) {
        timeEl.textContent = 'Error';
        timeEl.className = 'widget-time error';
        detailsEl.innerHTML = `<span class="error">${data.error}</span>`;
        return;
      }

      if (data.status !== 'OK' || !data.routes.length) {
        timeEl.textContent = 'N/A';
        timeEl.className = 'widget-time';
        detailsEl.innerHTML = `<span class="error">No route found (${data.status})</span>`;
        return;
      }

      const leg = data.routes[0].legs[0];
      const normalDuration = leg.duration.value;
      const trafficDuration = leg.duration_in_traffic
        ? leg.duration_in_traffic.value
        : normalDuration;
      const trafficText = leg.duration_in_traffic
        ? leg.duration_in_traffic.text
        : leg.duration.text;
      const distance = leg.distance.text;

      const ratio = trafficDuration / normalDuration;
      let severity = 'light';
      let timeClass = '';
      if (ratio > 1.4) { severity = 'heavy'; timeClass = 'heavy'; }
      else if (ratio > 1.15) { severity = 'moderate'; timeClass = 'moderate'; }

      timeEl.textContent = trafficText;
      timeEl.className = `widget-time ${timeClass}`;
      detailsEl.innerHTML = `
        <span><span class="traffic-indicator ${severity}"></span>Traffic: ${severity}</span>
        <span>Distance: ${distance}</span>
        <span>Without traffic: ${leg.duration.text}</span>
      `;
    }

    async function fetchDirections(dest, index) {
      const goTimeEl = document.getElementById(`go-time-${index}`);
      const goDetailsEl = document.getElementById(`go-details-${index}`);
      const returnTimeEl = document.getElementById(`return-time-${index}`);
      const returnDetailsEl = document.getElementById(`return-details-${index}`);

      try {
        const [goRes, returnRes] = await Promise.all([
          fetch(`/api/directions?origin=${encodeURIComponent(config.homeAddress)}&destination=${encodeURIComponent(dest.address)}&mode=${dest.mode}`),
          fetch(`/api/directions?origin=${encodeURIComponent(dest.address)}&destination=${encodeURIComponent(config.homeAddress)}&mode=${dest.mode}`)
        ]);
        const [goData, returnData] = await Promise.all([goRes.json(), returnRes.json()]);

        renderDirectionResult(goTimeEl, goDetailsEl, goData);
        renderDirectionResult(returnTimeEl, returnDetailsEl, returnData);
      } catch (err) {
        goTimeEl.textContent = 'Error';
        goTimeEl.className = 'widget-time error';
        goDetailsEl.innerHTML = `<span class="error">${err.message}</span>`;
        returnTimeEl.textContent = 'Error';
        returnTimeEl.className = 'widget-time error';
        returnDetailsEl.innerHTML = `<span class="error">${err.message}</span>`;
      }
    }

    async function fetchAllDirections() {
      if (!config) return;
      const promises = config.destinations.map((dest, i) => fetchDirections(dest, i));
      await Promise.all(promises);
      document.getElementById('lastUpdated').textContent =
        `Last updated: ${new Date().toLocaleTimeString()}`;
    }

    // Auto-refresh every 2 minutes
    setInterval(fetchAllDirections, 120000);

    loadConfig();

    // --- Map (on-demand) ---
    let map = null;
    let directionsRenderer = null;
    const routeColors = ['#818cf8', '#f472b6', '#fbbf24', '#34d399'];

    function ensureMap() {
      if (map) return;
      map = new google.maps.Map(document.getElementById('map'), {
        zoom: 12,
        center: { lat: 40.885, lng: -74.012 },
        mapId: 'DEMO_MAP_ID',
        colorScheme: 'DARK'
      });
    }

    function showRoute(index, direction) {
      ensureMap();

      // Clear previous route
      if (directionsRenderer) directionsRenderer.setMap(null);

      const dest = config.destinations[index];
      const modeMap = {
        driving: google.maps.TravelMode.DRIVING,
        transit: google.maps.TravelMode.TRANSIT,
        walking: google.maps.TravelMode.WALKING,
        bicycling: google.maps.TravelMode.BICYCLING
      };
      const travelMode = modeMap[dest.mode] || google.maps.TravelMode.DRIVING;

      const origin = direction === 'go' ? config.homeAddress : dest.address;
      const destination = direction === 'go' ? dest.address : config.homeAddress;
      const dirLabel = direction === 'go' ? 'Home → ' + dest.label : dest.label + ' → Home';

      directionsRenderer = new google.maps.DirectionsRenderer({
        map: map,
        polylineOptions: {
          strokeColor: routeColors[index % routeColors.length],
          strokeWeight: 5,
          strokeOpacity: 0.9
        }
      });

      const routeOptions = { origin, destination, travelMode };
      if (travelMode === google.maps.TravelMode.DRIVING) {
        routeOptions.drivingOptions = { departureTime: new Date(), trafficModel: google.maps.TrafficModel.BEST_GUESS };
      }
      if (travelMode === google.maps.TravelMode.TRANSIT) {
        routeOptions.transitOptions = { departureTime: new Date() };
      }

      const directionsService = new google.maps.DirectionsService();
      directionsService.route(routeOptions, (result, status) => {
        if (status === 'OK') {
          directionsRenderer.setDirections(result);
        }
      });

      // Show map
      document.getElementById('map').classList.add('visible');
      document.getElementById('mapHeader').classList.add('visible');
      document.getElementById('mapTitle').textContent = dirLabel;
      document.getElementById('map').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function closeMap() {
      document.getElementById('map').classList.remove('visible');
      document.getElementById('mapHeader').classList.remove('visible');
      if (directionsRenderer) {
        directionsRenderer.setMap(null);
        directionsRenderer = null;
      }
    }

    // Load Google Maps JS API dynamically
    fetch('/api/config').then(r => r.json()).then(c => {
      const script = document.createElement('script');
      script.src = `https://maps.googleapis.com/maps/api/js?key=${c.apiKey}`;
      script.async = true;
      script.defer = true;
      document.head.appendChild(script);
    });
  </script>
</body>
</html>
